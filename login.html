<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style1.css">

<body>
    <header>
        <div class="container">
            <a href=""><img src="image/Group (3).png" alt="logo"></a>
        </div>
    </header>
    <main>
        <section class="log-in">
            <div class="container">
                <div class="login">
                    <div class="content">
                        <div class="top-log">
                            <img src="image/Group (3).png" alt="">
                            <h2>تسجيل الدخول إلى الحساب</h2>
                            <p>ادخل البريد الإلكتروني أو رقم الهاتف وكلمة المرور
                            </p>
                        </div>
                        
                        <div class="form">
                            <form action="">
                                <div class="form-group">
                                    <label for="">عنوان البريد الإلكتروني</label>
                                    <input type="email" placeholder="البريد الالكتروني">
                                </div>
                                <div class="form-group">
                                    <div class="label">
                                        <label for="">كلمة المرور</label>
                                        <a href="forget password.html" target="_blank">هل نسيت كلمة المرور؟</a>
                                    </div>
                                <div class="password-wrapper">
                                        <input type="password" placeholder="••••••">
                                        <i class="far fa-eye-slash eye-icon"></i>
                                        </div>
                                    </div>
                                    <!-- تذكرني -->
                                    <div class="remember-me">
                                        <label>تذكر كلمة المرور</label>
                                        <input type="checkbox" checked>
                                    </div>

                                <!-- <div class="form-group">
                                    <div class="label">
                                        <label for="">كلمة المرور</label>
                                        <a href="forget password.html" target="_blank">هل نسيت كلمة المرور؟</a>
                                    </div>
                                    <input type="password" class="check"><i class="fas fa-eye"></i>
                                    <div><input type="checkbox">تذكر كلمة المرور</div>
                                </div> -->
                            </form>
                            
                            <!-- <div class="btn-submit">
                                <a href="">تسجيل الدخول</a>
                                <p>ليس لديك حساب؟<a href="">إنشاء حساب</a></p>
                            </div> -->
                            <button type="submit" class="btn-submit">تسجيل الدخول</button>
                            <p>ليس لديك حساب؟<a href="">إنشاء حساب</a></p>
                            <a href="">الدخول باستخدام فيسبوك</a><i class="fab fa-facebook"></i>
                            <a href="">Google الدخول باستخدام</a><i class="fab fa-google"></i>
                        </div>
                    </div>
                </div>
            </div><!--/.container-->
        </section>
